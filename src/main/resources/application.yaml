spring:
  datasource:
    url: jdbc:h2:mem:entregasdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update #Cria e atualiza as tabelas automaticamente
    show-sql: true     #Mostra os comandos SQL no terminal

  h2:
    console:
      enabled: true
      path: /h2-console